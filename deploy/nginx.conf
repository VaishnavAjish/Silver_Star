# ============================================================
# Silverstar Grow — Nginx Production Config
#
# Setup:
#   1. sudo cp deploy/nginx.conf /etc/nginx/sites-available/silverstar-grow
#   2. sudo ln -s /etc/nginx/sites-available/silverstar-grow /etc/nginx/sites-enabled/
#   3. Replace YOUR_DOMAIN.COM everywhere below
#   4. sudo certbot --nginx -d YOUR_DOMAIN.COM
#   5. sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Rate limiting zones (defined at http block level in nginx.conf if needed)
# These must go in the http {} block of /etc/nginx/nginx.conf, not here.
# Add to /etc/nginx/nginx.conf:
#   limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
#   limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

upstream silverstar_backend {
    # PM2 cluster — all workers share port 5001
    server 127.0.0.1:5001;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://YOUR_DOMAIN.COM$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # SSL — managed by Certbot / ACM
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # HSTS (2 years, include subdomains, preload)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                  always;
    add_header X-Content-Type-Options    "nosniff"                     always;
    add_header X-XSS-Protection          "1; mode=block"               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Health check (unauthenticated — for ALB probes) ──────────────────
    location = /api/health {
        proxy_pass         http://silverstar_backend/api/health;
        access_log         off;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ── Native WebSocket upgrade ──────────────────────────────────────────
    location /ws {
        proxy_pass         http://silverstar_backend/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Auth endpoints (tighter rate limit) ───────────────────────────────
    location /api/auth/login {
        limit_req          zone=auth burst=10 nodelay;
        proxy_pass         http://silverstar_backend/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── All other API requests ────────────────────────────────────────────
    location /api {
        limit_req          zone=api burst=50 nodelay;
        proxy_pass         http://silverstar_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
        proxy_buffering    off;
    }

    # ── Static React build (served by Node when SERVE_STATIC=true) ───────
    # Or serve directly from nginx if you copy the build here:
    # root /var/www/silverstar-grow;
    # try_files $uri $uri/ /index.html;
    location / {
        proxy_pass         http://silverstar_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 35s;

        # Cache static assets at CDN/browser level
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            proxy_pass http://silverstar_backend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Block hidden files ────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
