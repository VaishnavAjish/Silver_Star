# ============================================
# Silverstar Grow — Nginx reverse proxy
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/silverstar-grow
#   sudo ln -s /etc/nginx/sites-available/silverstar-grow /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Enable HTTPS:
#   sudo certbot --nginx -d your-domain.com
# ============================================

server {
    listen 80;
    server_name your-domain.com;   # <-- replace

    # Redirect HTTP -> HTTPS once certbot has issued a certificate
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    # Node app (serves both API + built React)
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }

    # Health check endpoint (exposed for monitoring)
    location = /api/health {
        proxy_pass http://127.0.0.1:5000/api/health;
        access_log off;
    }
}
